name: torch-tk
channels:
  - conda-forge
dependencies:
  # Python runtime
  - python=3.12
  - pip

  # Conda/Mamba package management
  - mamba

  # Build-system requirements from pyproject.toml
  - setuptools>=77
  - wheel

  # Runtime dependencies from pyproject.toml
  - pytorch-gpu
  - cuda-cudart-dev
  - cuda-nvcc
  - numpy
  - xarray
  - matplotlib
  - scipy

  # Development tooling from [project.optional-dependencies].dev
  - python-build
  - twine
  - pytest
  - pytest-cov
  - mypy
  - ruff
  - pre-commit

  # Jupyter support for local development notebooks
  - jupyter_client
  - jupyter_core
  - notebook
  - ipykernel
